name: apply-p3-10-bootstrap

on:
  push:
    branches: ["phase3/p3-10-recovery"]

permissions:
  contents: write

concurrency:
  group: apply-p3-10-bootstrap
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout P3-10 branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: phase3/p3-10-recovery

      - name: Apply content-verified P3-10 patch
        shell: bash
        run: |
          set -euo pipefail
          payload="bootstrap/p3-10.patch.xz.b64"
          test -f "$payload"
          base64 --decode "$payload" | xz --decompress > /tmp/p3-10.patch
          echo "35bfae70e629a1773d078c8e58479a49eaea520e402fe69a427a906cdffb749c  /tmp/p3-10.patch" | sha256sum --check --strict
          git apply --check /tmp/p3-10.patch
          git apply --index /tmp/p3-10.patch
          git rm "$payload"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "P3-10: complete content-bound clean-room recovery"
          git push origin HEAD:phase3/p3-10-recovery
