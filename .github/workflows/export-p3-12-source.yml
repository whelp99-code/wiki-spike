name: export-p3-12-source

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Archive source tree
        run: tar --exclude=.git -czf /tmp/wiki-spike-p3-11-main.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: wiki-spike-p3-11-main-source
          path: /tmp/wiki-spike-p3-11-main.tar.gz
          retention-days: 1
