name: phase3-preflight

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "phase3/**"]

permissions:
  contents: read

concurrency:
  group: phase3-preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: P3-00 preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and test tooling
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run P3-00 preflight gates
        env:
          PYTHONHASHSEED: "0"
          P3_00_LOG_DIR: artifacts/conformance/phase3/${{ github.sha }}/logs
          P3_00_EVIDENCE_OUT: artifacts/conformance/phase3/${{ github.sha }}/evidence.json
        run: bash scripts/run_p3_00_preflight.sh

      - name: Upload machine-readable evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p3-00-conformance-${{ github.sha }}
          path: artifacts/conformance/phase3/${{ github.sha }}/
          if-no-files-found: error
          retention-days: 30
