name: phase4-g4-conformance

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "phase4/**"]

permissions:
  contents: read

concurrency:
  group: phase4-g4-${{ github.ref }}
  cancel-in-progress: true

jobs:
  g4:
    name: G4 conformance checkpoint
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project and tooling
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Run G4 gate
        run: bash scripts/run_p4_14_gate.sh
      - name: Upload G4 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase4-g4-${{ github.sha }}
          path: artifacts/conformance/phase4/G4/
          if-no-files-found: error
          retention-days: 90
