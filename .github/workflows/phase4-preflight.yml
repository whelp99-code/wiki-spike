name: phase4-preflight

on:
  pull_request:
    branches: [main]
  push:
    branches: ["phase4/**"]

permissions:
  contents: read

concurrency:
  group: phase4-preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: P4-00 contract pin
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout full history and tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and test tooling
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run P4-00 contract and boundary gates
        env:
          PYTHONHASHSEED: "0"
          P4_00_LOG_DIR: artifacts/conformance/phase4/${{ github.sha }}/logs
          P4_00_EVIDENCE_OUT: artifacts/conformance/phase4/${{ github.sha }}/evidence.json
        run: bash scripts/run_p4_00_preflight.sh

      - name: Upload P4-00 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase4-p4-00-conformance-${{ github.sha }}
          path: artifacts/conformance/phase4/${{ github.sha }}/
          if-no-files-found: error
          retention-days: 90
