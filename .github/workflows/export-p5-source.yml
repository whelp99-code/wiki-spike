name: export-p5-source

on:
  push:
    branches: ["tmp/p5-source-export"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Create exact G4 main source archive and bundle
        shell: bash
        env:
          G4_COMMIT: 6de541c3b8897f608dd4752cb643109e720aa4c7
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output=/tmp/wiki-spike-g4-main-source.tar.gz "$G4_COMMIT"
          git bundle create /tmp/wiki-spike-g4-main.bundle --all
      - uses: actions/upload-artifact@v4
        with:
          name: wiki-spike-g4-main-source
          path: /tmp/wiki-spike-g4-main-source.tar.gz
          if-no-files-found: error
          retention-days: 1
      - uses: actions/upload-artifact@v4
        with:
          name: wiki-spike-g4-main-bundle
          path: /tmp/wiki-spike-g4-main.bundle
          if-no-files-found: error
          retention-days: 1
