name: apply-p3-11-bootstrap

on:
  push:
    branches: ["phase3/p3-11-operability-privacy"]

permissions:
  contents: write

concurrency:
  group: apply-p3-11-bootstrap
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: phase3/p3-11-operability-privacy

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply verified P3-11 payload
        shell: bash
        run: |
          set -euo pipefail
          parts="bootstrap/p3-11.parts"
          if [[ ! -d "$parts" ]]; then
            echo "P3-11 payload already applied."
            exit 0
          fi

          cat "$parts"/* > /tmp/p3-11.tar.gz.b64
          base64 --decode /tmp/p3-11.tar.gz.b64 > /tmp/p3-11.tar.gz
          echo "96d9ec37a83da64a56b5375d35456380eee13798a5d099199dbceff7e7b6177e  /tmp/p3-11.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/p3-11.tar.gz -C .

          python - <<'PY'
          from pathlib import Path

          path = Path("src/wiki_spike/memory_core/__init__.py")
          text = path.read_text("utf-8")
          block = '''from .operability import (\n    AUDIT_RECORD_VERSION, EXPORT_JOB_VERSION, EXPORT_REQUEST_VERSION,\n    TELEMETRY_POINT_VERSION, WORK_ITEM_VERSION, AuditCapacityExceeded,\n    AuditRecorder, AuditReference, AuditSink, BackpressureController,\n    BoundedInMemoryAuditSink, BoundedProjectionJobSubmitter, BoundedWorkItem,\n    BoundedWorkQueue, BudgetDecision, CircuitBreaker, CircuitDecision,\n    CircuitState, ExportProjectionJob, ExportRequest, ExportRequestGateway,\n    ExportSubmissionResult, OperabilityError, PrivacyPreservingTelemetry,\n    ProjectionJobSubmitter, QueueDecision, ReferenceHasher, RetryBudget,\n    TelemetryAuditUnavailable, TelemetryDeliveryResult, TelemetryPoint,\n    TelemetrySink,\n)\n'''
          if "from .operability import (" not in text:
              marker = "from .plugins import ("
              if marker not in text:
                  raise SystemExit("cannot locate plugin import anchor")
              text = text.replace(marker, block + marker, 1)

          names = [
              "AUDIT_RECORD_VERSION", "EXPORT_JOB_VERSION", "EXPORT_REQUEST_VERSION",
              "TELEMETRY_POINT_VERSION", "WORK_ITEM_VERSION", "AuditCapacityExceeded",
              "AuditRecorder", "AuditReference", "AuditSink", "BackpressureController",
              "BoundedInMemoryAuditSink", "BoundedProjectionJobSubmitter", "BoundedWorkItem",
              "BoundedWorkQueue", "BudgetDecision", "CircuitBreaker", "CircuitDecision",
              "CircuitState", "ExportProjectionJob", "ExportRequest", "ExportRequestGateway",
              "ExportSubmissionResult", "OperabilityError", "PrivacyPreservingTelemetry",
              "ProjectionJobSubmitter", "QueueDecision", "ReferenceHasher", "RetryBudget",
              "TelemetryAuditUnavailable", "TelemetryDeliveryResult", "TelemetryPoint",
              "TelemetrySink",
          ]
          if '    "AUDIT_RECORD_VERSION",\n' not in text:
              anchor = '    "PLUGIN_MANIFEST_VERSION",\n'
              if anchor not in text:
                  raise SystemExit("cannot locate __all__ anchor")
              text = text.replace(anchor, ''.join(f'    "{name}",\n' for name in names) + anchor, 1)
          path.write_text(text, encoding="utf-8")
          PY

          git rm -r "$parts"
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m compileall -q src
          PYTHONPATH=src python -m pytest -W error -q tests/phase3/test_p3_11_operability_privacy.py
          PYTHONPATH=src python scripts/check_architecture_boundaries.py
          PYTHONPATH=src python scripts/scan_secrets.py

          git add \
            src/wiki_spike/memory_core/__init__.py \
            src/wiki_spike/memory_core/operability.py \
            tests/phase3/test_p3_11_operability_privacy.py \
            schemas/phase3/operability-contracts.schema.json \
            docs/adr/ADR-0009-operability-privacy-backpressure.md \
            docs/adversarial/P3-11_ADVERSARIAL_VALIDATION_20R_KR.md \
            artifacts/conformance/phase3/P3-11/report.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "P3-11: privacy-preserving operability and bounded export requests"
          git push origin HEAD:phase3/p3-11-operability-privacy
