name: create-phase4-runtime-tag

on:
  push:
    branches: ["tmp/create-phase4-runtime-tag"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Create immutable annotated release tag
        shell: bash
        env:
          RELEASE_TAG: phase4-runtime-v1.0.0
          RELEASE_COMMIT: 6de541c3b8897f608dd4752cb643109e720aa4c7
        run: |
          set -euo pipefail
          git fetch origin main --tags
          test "$(git rev-parse origin/main)" = "$RELEASE_COMMIT"
          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            test "$(git rev-list -n 1 "refs/tags/$RELEASE_TAG")" = "$RELEASE_COMMIT"
            test "$(git cat-file -t "refs/tags/$RELEASE_TAG")" = "tag"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" "$RELEASE_COMMIT" -m "Phase 4 Memory Runtime v1.0.0 — signed G4 checkpoint 3d829db02f3178b3c7b32275f79db4839059242b4f1db1e902fe512f93f7d5b7"
          git push origin "refs/tags/$RELEASE_TAG"
